<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;1,200&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-esquerda">
        <img src="Logo MediSync.png" alt="MediSync" />
      </div>

      <div class="menu">
        <a href="Home.html">Início</a>
        <a href="Consultas.html">Minhas consultas</a>
        <a href="Historico.html">Histórico Médico</a>
        <a href="Agendar.html">Agendar Consulta</a>
      </div>

      <div class="nav-direita">
        <span class="material-symbols-outlined notificacao">notifications</span>
        <span
          class="material-symbols-outlined conta-user"
          onclick="irParaPerfil()"
          >account_circle</span
        >
      </div>
    </nav>
    <div class="perfil-container">
      <h1 class="titulo-perfil">Meu Perfil</h1>

      <div class="perfil-topo">
        <div class="avatar-perfil">
          <span class="material-symbols-outlined icone-user">
            account_circle
          </span>

          <span class="material-symbols-outlined icone-editar"> edit </span>
        </div>

        <div class="dados-pessoais">
          <h2>Dados pessoais</h2>

          <input type="text" placeholder="Nome Completo" />
          <input type="date" />

          <div class="linha">
            <input type="text" placeholder="CPF" />
            <select>
              <option>Gênero</option>
              <option>Feminino</option>
              <option>Masculino</option>
            </select>
          </div>
        </div>
      </div>

      <div class="perfil-meio">
        <div class="bloco">
          <h2>Informações de contato</h2>

          <input type="text" placeholder="Telefone celular" />
          <input type="email" placeholder="Endereço de e-mail" />

          <h2>Endereço</h2>

          <input type="text" placeholder="Rua / Avenida" />

          <div class="linha">
            <input type="text" placeholder="Número" />
            <input type="text" placeholder="CEP" />
          </div>

          <input type="text" placeholder="Bairro" />
        </div>

        <div class="bloco">
          <h2>Segurança da conta</h2>

          <button class="btn-secundario">Alterar senha</button>

          <h2 class="Preferência">Preferência de notificação</h2>

          <div class="checkbox-group">
            <label><input type="checkbox" /> Whatsapp</label>
            <label><input type="checkbox" /> E-mail</label>
            <label><input type="checkbox" /> SMS</label>
            <label><input type="checkbox" /> Outro</label>
          </div>

          <button class="btn-salvar">Salvar</button>
        </div>
      </div>
    </div>
    <script src="javascript.js" defer></script>
  </body>
</html>
