<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historico Médico</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;1,200&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-esquerda">
        <img src="Logo MediSync.png" alt="MediSync" />
      </div>
      <div class="menu">
        <a href="Home.html"> Início </a>
        <a href="Consultas.html"> Minhas consultas</a>
        <a href="Historico.html">Histórico Médico</a>
        <a href="Agendar.html">Agendar consultas</a>
      </div>
      <div class="nav-direita">
        <span class="material-symbols-outlined notificacao">notifications</span>
        <span
          class="material-symbols-outlined conta-user"
          onclick="irParaPerfil()"
          >account_circle</span
        >
      </div>
    </nav>

    <h2 class="titulo-historico">Historico médico</h2>
    <form class="form-historico">
      <div class="linha">
        <div class="campo-historico">
          <label for="evento">Tipo de Evento</label>
          <select id="evento">
            <option value="">Todos os eventos</option>
            <option value="consulta">Consultas</option>
            <option value="exame">Exames</option>
            <option value="medicamento">Medicamentos</option>
            <option value="internacoes">Internações</option>
            <option value="retorno">Retornos</option>
          </select>
        </div>
        <div class="campo-historico">
          <label for="periodo">Período</label>
          <select id="periodo">
            <option value="">Todos os períodos</option>
            <option value="7">Últimos 7 dias</option>
            <option value="30">Últimos 30 dias</option>
            <option value="90">Últimos 3 meses</option>
            <option value="180">Últimos 6 meses</option>
            <option value="365">Último ano</option>
          </select>
        </div>
      </div>
      <button type="submit" class="botao-historico">Filtrar</button>
    </form>
    <div class="lista-eventos"></div>
    <script src="javascript.js"></script>
  </body>
</html>
